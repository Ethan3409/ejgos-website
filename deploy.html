function log(msg, cls) {
  const el = document.getElementById('log');
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

function decompress(b64str) {
  const bin = atob(b64str);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const rawDeflate = bytes.slice(2, bytes.length - 4);
  const decompressed = pako.inflateRaw(rawDeflate);
  return decompressed;
}

async function runDeploy() {
  const btn = document.getElementById('deployBtn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  
  try {
    log('Creating Netlify deploy...', 'info');
    const fileManifest = {};
    for (const [name, info] of Object.entries(FILES)) {
      fileManifest['/' + name] = info.sha1;
    }
    
    const deployResp = await fetch('https://api.netlify.com/api/v1/sites/' + SITE_ID + '/deploys', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: fileManifest, async: false })
    });
    
    if (!deployResp.ok) {
      const errText = await deployResp.text();
      log('ERROR creating deploy: ' + deployResp.status + ' ' + errText, 'err');
      btn.disabled = false; return;
    }
    
    const deploy = await deployResp.json();
    const deployId = deploy.id;
    log('Deploy created: ' + deployId, 'ok');
    log('Files required: ' + JSON.stringify(deploy.required), 'info');
    
    const required = new Set(deploy.required || []);
    
    for (const [name, info] of Object.entries(FILES)) {
      const path = '/' + name;
      const sha1 = info.sha1;
      
      if (required.size > 0 && !required.has(sha1)) {
        log('Skipping ' + name + ' (already on CDN)', 'info');
        continue;
      }
      
      log('Decompressing ' + name + '...', 'info');
      let content;
      try {
        content = decompress(info.b64);
      } catch(e) {
        log('ERROR decompressing ' + name + ': ' + e.message, 'err');
        btn.disabled = false; return;
      }
      
      log('Uploading ' + name + ' (' + content.length + ' bytes)...', 'info');
      const uploadResp = await fetch('https://api.netlify.com/api/v1/deploys/' + deployId + '/files' + path, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/octet-stream' },
        body: content
      });
      
      if (!uploadResp.ok) {
        const errText = await uploadResp.text();
        log('ERROR uploading ' + name + ': ' + uploadResp.status + ' ' + errText, 'err');
        btn.disabled = false; return;
      }
      
      log('✓ Uploaded ' + name, 'ok');
    }
    
    log('', '');
    log('✅ ALL FILES DEPLOYED SUCCESSFULLY!', 'ok');
    log('🌐 Site live at: https://ejgos.netlify.app', 'ok');
    log('🌐 Custom domain: https://ejgos.com (DNS may take up to 2h)', 'ok');
    
  } catch(e) {
    log('ERROR: ' + e.message, 'err');
    btn.disabled = false;
  }
}
